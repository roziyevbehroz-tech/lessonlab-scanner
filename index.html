<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLabQR Scanner</title>
    <link rel="stylesheet" href="style.css">

    <!-- LOCAL JS-ArUco Library -->
    <script src="cv.js"></script>
    <script src="aruco.js"></script>

    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

    <!-- Yuqori qism: Sarlavha va Statistika -->
    <div class="top-bar">
        <div class="header">
            <h3>📷 LLabQR Scanner</h3>
            <span id="qcount">Savol: 1/10</span>
        </div>
        <div class="stats">
            <div class="stat-box correct">
                <span class="emoji">✅</span> <span id="correct-count">0</span>
            </div>
            <div class="stat-box wrong">
                <span class="emoji">❌</span> <span id="wrong-count">0</span>
            </div>
            <div class="stat-box total">
                <span class="emoji">👥</span> <span id="total-scanned">0</span>
            </div>
        </div>
    </div>

    <!-- Kamera oynasi -->
    <div class="camera-container">
        <!-- Debug oynasi -->
        <div id="debugConsole"></div>

        <video id="videoInput" playsinline style="display:none;"></video>
        <canvas id="canvasOutput"></canvas>
        <div id="loadingMessage">Kamera yuklanmoqda...</div>
    </div>

    <!-- Pastki qism: Natijalar ro'yxati -->
    <div class="results-container">
        <h4>Oxirgi natijalar:</h4>
        <ul id="results-list">
            <!-- Natijalar shu yerga tushadi -->
        </ul>
    </div>

    <!-- Boshqaruv tugmalari -->
    <div class="controls">
        <button id="next-question-btn" class="btn primary">Keyingi savol ➡️</button>
        <button id="finish-test-btn" class="btn danger">Tugatish 🏁</button>
    </div>

    <script src="app.js"></script>
</body>

</html>
