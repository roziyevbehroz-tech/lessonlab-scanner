<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LessonLab Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background-color: #000; color: white; display: flex; flex-direction: column; align-items: center; }
        #video-container { width: 100%; height: 70vh; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #status { padding: 20px; font-size: 18px; text-align: center; }
        button { padding: 15px 30px; font-size: 18px; background: #2481cc; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="status">Kamera yuklanmoqda...</div>
    
    <div id="video-container">
        <video id="camera" autoplay playsinline></video>
    </div>

    <br>
    <button onclick="closeApp()">Yopish</button>

    <script>
        // Telegram WebApp ni ishga tushirish
        let tg = window.Telegram.WebApp;
        tg.expand(); 

        const video = document.getElementById('camera');
        const status = document.getElementById('status');

        // Kamerani ishga tushirish funksiyasi
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } // Orqa kamera
                });
                video.srcObject = stream;
                status.innerText = "Skanerlashga tayyor!";
            } catch (error) {
                status.innerText = "Xatolik: Kameraga ruxsat bering.";
                console.error(error);
            }
        }

        function closeApp() {
            tg.close();
        }

        // Sahifa ochilganda kamerani yoqish
        startCamera();
    </script>
</body>
</html>
