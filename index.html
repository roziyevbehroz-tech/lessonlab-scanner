<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLabQR Scanner</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

    <!-- Yuqori qism -->
    <div class="top-bar">
        <div class="header">
            <h3>📷 LLabQR Scanner</h3>
            <span id="qcount">Savol: <span id="current-q">1</span>/10</span>
        </div>
        <div class="stats">
            <div class="stat-box correct">✅ <span id="correct-count">0</span></div>
            <div class="stat-box wrong">❌ <span id="wrong-count">0</span></div>
            <div class="stat-box total">👥 <span id="total-scanned">0</span></div>
        </div>
    </div>

    <!-- TO'G'RI JAVOBNI TANLASH -->
    <div class="answer-selector">
        <span>To'g'ri javob:</span>
        <button class="ans-btn" data-ans="A">A</button>
        <button class="ans-btn" data-ans="B">B</button>
        <button class="ans-btn" data-ans="C">C</button>
        <button class="ans-btn" data-ans="D">D</button>
    </div>

    <!-- Kamera sozlamalari -->
    <div class="camera-settings">
        <select id="cameraSelect">
            <option value="">Kamerani tanlang...</option>
        </select>
        <button id="switchCameraBtn" class="btn small">🔄</button>
    </div>

    <!-- Kamera -->
    <div class="camera-container">
        <div id="debugConsole"></div>
        <video id="videoInput" playsinline autoplay muted style="display:none;"></video>
        <canvas id="canvasOutput"></canvas>
        <div id="loadingMessage">Kamera yuklanmoqda...</div>
    </div>

    <!-- Natijalar -->
    <div class="results-container">
        <h4>Natijalar:</h4>
        <ul id="results-list"></ul>
    </div>

    <!-- Tugmalar -->
    <div class="controls">
        <button id="next-question-btn" class="btn primary">Keyingi ➡️</button>
        <button id="finish-test-btn" class="btn danger">Tugatish 🏁</button>
    </div>

    <script src="app.js"></script>
</body>

</html>
