<!DOCTYPE html>
<html lang="uz">

<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>LLabQR — Quiz Display</title>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap"
                    rel="stylesheet">
          <style>
                    * {
                              margin: 0;
                              padding: 0;
                              box-sizing: border-box;
                    }

                    body {
                              font-family: 'Inter', sans-serif;
                              background: #0a0e17;
                              color: #fff;
                              height: 100vh;
                              display: flex;
                              flex-direction: column;
                              overflow: hidden;
                              user-select: none;
                    }

                    /* === TOP BAR === */
                    .topbar {
                              display: flex;
                              justify-content: space-between;
                              align-items: center;
                              padding: 16px 32px;
                              background: linear-gradient(135deg, #1a1f2e, #0f1422);
                              border-bottom: 1px solid rgba(255, 255, 255, 0.06);
                    }

                    .topbar-left {
                              display: flex;
                              align-items: center;
                              gap: 12px;
                    }

                    .topbar-left .logo {
                              width: 40px;
                              height: 40px;
                              background: linear-gradient(135deg, #6366f1, #8b5cf6);
                              border-radius: 10px;
                              display: flex;
                              align-items: center;
                              justify-content: center;
                              font-size: 20px;
                    }

                    .topbar-left h2 {
                              font-size: 18px;
                              font-weight: 700;
                    }

                    .topbar-left .class-name {
                              color: #94a3b8;
                              font-size: 14px;
                    }

                    .topbar-right {
                              display: flex;
                              align-items: center;
                              gap: 24px;
                    }

                    .question-counter {
                              background: rgba(99, 102, 241, 0.15);
                              border: 1px solid rgba(99, 102, 241, 0.3);
                              padding: 8px 20px;
                              border-radius: 24px;
                              font-weight: 700;
                              font-size: 16px;
                              color: #a5b4fc;
                    }

                    .timer {
                              font-size: 28px;
                              font-weight: 900;
                              color: #f59e0b;
                              font-variant-numeric: tabular-nums;
                    }

                    /* === PROGRESS BAR === */
                    .progress-bar {
                              height: 4px;
                              background: rgba(255, 255, 255, 0.06);
                    }

                    .progress-fill {
                              height: 100%;
                              background: linear-gradient(90deg, #6366f1, #8b5cf6, #a78bfa);
                              transition: width 0.5s ease;
                              border-radius: 0 2px 2px 0;
                    }

                    /* === MAIN CONTENT === */
                    .main {
                              flex: 1;
                              display: flex;
                              flex-direction: column;
                              justify-content: center;
                              align-items: center;
                              padding: 40px 60px;
                              gap: 48px;
                    }

                    /* Question text */
                    .question-text {
                              font-size: clamp(28px, 4vw, 52px);
                              font-weight: 900;
                              text-align: center;
                              line-height: 1.3;
                              max-width: 900px;
                              text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
                    }

                    /* Options grid */
                    .options-grid {
                              display: grid;
                              grid-template-columns: 1fr 1fr;
                              gap: 20px;
                              width: 100%;
                              max-width: 900px;
                    }

                    .option {
                              display: flex;
                              align-items: center;
                              gap: 20px;
                              padding: 24px 32px;
                              border-radius: 16px;
                              font-size: clamp(18px, 2.5vw, 28px);
                              font-weight: 600;
                              transition: all 0.3s ease;
                              cursor: default;
                    }

                    .option .letter {
                              width: 52px;
                              height: 52px;
                              border-radius: 12px;
                              display: flex;
                              align-items: center;
                              justify-content: center;
                              font-weight: 900;
                              font-size: 24px;
                              flex-shrink: 0;
                    }

                    /* Option colors — Plickers style */
                    .option-a {
                              background: rgba(239, 68, 68, 0.12);
                              border: 2px solid rgba(239, 68, 68, 0.3);
                    }

                    .option-a .letter {
                              background: #ef4444;
                              color: #fff;
                    }

                    .option-b {
                              background: rgba(59, 130, 246, 0.12);
                              border: 2px solid rgba(59, 130, 246, 0.3);
                    }

                    .option-b .letter {
                              background: #3b82f6;
                              color: #fff;
                    }

                    .option-c {
                              background: rgba(245, 158, 11, 0.12);
                              border: 2px solid rgba(245, 158, 11, 0.3);
                    }

                    .option-c .letter {
                              background: #f59e0b;
                              color: #fff;
                    }

                    .option-d {
                              background: rgba(34, 197, 94, 0.12);
                              border: 2px solid rgba(34, 197, 94, 0.3);
                    }

                    .option-d .letter {
                              background: #22c55e;
                              color: #fff;
                    }

                    /* Correct answer highlight */
                    .option.correct {
                              border-color: #22c55e !important;
                              background: rgba(34, 197, 94, 0.25) !important;
                              box-shadow: 0 0 30px rgba(34, 197, 94, 0.2);
                    }

                    .option.correct::after {
                              content: '✓';
                              margin-left: auto;
                              font-size: 32px;
                              color: #22c55e;
                    }

                    /* === BOTTOM CONTROLS === */
                    .bottom-bar {
                              display: flex;
                              justify-content: space-between;
                              align-items: center;
                              padding: 16px 32px;
                              background: rgba(15, 20, 34, 0.95);
                              border-top: 1px solid rgba(255, 255, 255, 0.06);
                    }

                    .nav-btn {
                              padding: 12px 32px;
                              border: 2px solid rgba(255, 255, 255, 0.15);
                              border-radius: 12px;
                              background: rgba(255, 255, 255, 0.05);
                              color: #e2e8f0;
                              font-size: 16px;
                              font-weight: 600;
                              cursor: pointer;
                              transition: all 0.2s;
                              font-family: 'Inter', sans-serif;
                    }

                    .nav-btn:hover {
                              background: rgba(255, 255, 255, 0.1);
                              border-color: rgba(255, 255, 255, 0.3);
                    }

                    .nav-btn.primary {
                              background: linear-gradient(135deg, #6366f1, #8b5cf6);
                              border-color: transparent;
                              color: #fff;
                    }

                    .nav-btn.primary:hover {
                              opacity: 0.9;
                    }

                    .nav-btn:disabled {
                              opacity: 0.3;
                              cursor: not-allowed;
                    }

                    .bottom-hint {
                              color: #64748b;
                              font-size: 14px;
                    }

                    /* === WELCOME SCREEN === */
                    .welcome {
                              flex: 1;
                              display: flex;
                              flex-direction: column;
                              justify-content: center;
                              align-items: center;
                              gap: 24px;
                              text-align: center;
                    }

                    .welcome .big-icon {
                              font-size: 80px;
                              animation: pulse 2s infinite;
                    }

                    .welcome h1 {
                              font-size: 48px;
                              font-weight: 900;
                    }

                    .welcome p {
                              font-size: 20px;
                              color: #94a3b8;
                              max-width: 500px;
                    }

                    .welcome .start-btn {
                              margin-top: 20px;
                              padding: 18px 48px;
                              background: linear-gradient(135deg, #6366f1, #8b5cf6);
                              border: none;
                              border-radius: 16px;
                              color: #fff;
                              font-size: 20px;
                              font-weight: 700;
                              cursor: pointer;
                              transition: all 0.3s;
                              font-family: 'Inter', sans-serif;
                    }

                    .welcome .start-btn:hover {
                              transform: scale(1.05);
                              box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
                    }

                    /* Leaderboard */
                    .leaderboard {
                              flex: 1;
                              display: flex;
                              flex-direction: column;
                              align-items: center;
                              padding: 40px;
                              gap: 24px;
                              overflow-y: auto;
                    }

                    .leaderboard h1 {
                              font-size: 36px;
                    }

                    .lb-table {
                              width: 100%;
                              max-width: 700px;
                    }

                    .lb-row {
                              display: flex;
                              align-items: center;
                              gap: 16px;
                              padding: 14px 24px;
                              border-radius: 12px;
                              margin-bottom: 8px;
                              font-size: 18px;
                              font-weight: 600;
                    }

                    .lb-row:nth-child(1) {
                              background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(245, 158, 11, 0.05));
                              border: 1px solid rgba(245, 158, 11, 0.3);
                    }

                    .lb-row:nth-child(2) {
                              background: rgba(148, 163, 184, 0.1);
                              border: 1px solid rgba(148, 163, 184, 0.2);
                    }

                    .lb-row:nth-child(3) {
                              background: rgba(180, 83, 9, 0.1);
                              border: 1px solid rgba(180, 83, 9, 0.2);
                    }

                    .lb-row .rank {
                              width: 36px;
                              text-align: center;
                              font-size: 22px;
                    }

                    .lb-row .name {
                              flex: 1;
                    }

                    .lb-row .score {
                              color: #22c55e;
                              font-weight: 900;
                    }

                    @keyframes pulse {

                              0%,
                              100% {
                                        transform: scale(1);
                              }

                              50% {
                                        transform: scale(1.08);
                              }
                    }

                    /* Fullscreen button */
                    .fs-btn {
                              position: fixed;
                              top: 12px;
                              right: 12px;
                              z-index: 999;
                              background: rgba(255, 255, 255, 0.1);
                              border: none;
                              color: #fff;
                              padding: 8px 12px;
                              border-radius: 8px;
                              cursor: pointer;
                              font-size: 18px;
                    }

                    /* Hide sections */
                    .hidden {
                              display: none !important;
                    }
          </style>
</head>

<body>
          <button class="fs-btn" id="fullscreenBtn" title="Fullscreen">⛶</button>

          <!-- === WELCOME SCREEN === -->
          <div id="welcomeScreen" class="welcome">
                    <div class="big-icon">📋</div>
                    <h1 id="welcomeTitle">Test yuklanmoqda...</h1>
                    <p id="welcomeInfo">Ma'lumotlar tayyorlanmoqda</p>
                    <button class="start-btn" id="startBtn" style="display:none">▶ Boshlash</button>
          </div>

          <!-- === QUIZ SCREEN === -->
          <div id="quizScreen" class="hidden">
                    <div class="topbar">
                              <div class="topbar-left">
                                        <div class="logo">📷</div>
                                        <div>
                                                  <h2 id="testTitle">LLabQR</h2>
                                                  <div class="class-name" id="className"></div>
                                        </div>
                              </div>
                              <div class="topbar-right">
                                        <div class="question-counter" id="questionCounter">1 / 10</div>
                                        <div class="timer" id="timerDisplay">--</div>
                              </div>
                    </div>
                    <div class="progress-bar">
                              <div class="progress-fill" id="progressFill"></div>
                    </div>

                    <div class="main">
                              <div class="question-text" id="questionText">Savol matni</div>
                              <div class="options-grid" id="optionsGrid"></div>
                    </div>

                    <div class="bottom-bar">
                              <button class="nav-btn" id="prevBtn">◀ Oldingi</button>
                              <span class="bottom-hint">⌨ Klaviaturadan: ← → yoki Spacebar</span>
                              <button class="nav-btn" id="showAnswerBtn">👁 Javobni ko'rsatish</button>
                              <button class="nav-btn primary" id="nextBtn">Keyingi ▶</button>
                    </div>
          </div>

          <!-- === LEADERBOARD SCREEN === -->
          <div id="leaderboardScreen" class="hidden leaderboard">
                    <div class="big-icon" style="font-size:60px">🏆</div>
                    <h1>Natijalar</h1>
                    <div class="lb-table" id="lbTable"></div>
          </div>

          <script>
                    (function () {
                              // === DATA ===
                              let testData = null;
                              let currentQ = 0;
                              let answerRevealed = false;
                              let timerInterval = null;
                              let timerSeconds = 0;

                              // === PARSE URL DATA ===
                              function loadTestData() {
                                        const params = new URLSearchParams(window.location.search);
                                        const encoded = params.get('data');
                                        if (encoded) {
                                                  try {
                                                            testData = JSON.parse(atob(encoded));
                                                            showWelcome();
                                                  } catch (e) {
                                                            document.getElementById('welcomeTitle').textContent = '⚠️ Xato';
                                                            document.getElementById('welcomeInfo').textContent = 'Test ma\'lumotlari noto\'g\'ri.';
                                                  }
                                        } else {
                                                  // Demo mode
                                                  testData = {
                                                            title: "Demo Test",
                                                            class_name: "Namuna sinf",
                                                            students: [],
                                                            questions: [
                                                                      { text: "Father so'zining tarjimasi nima?", options: ["Ota", "Ona", "Aka", "Uka"], correct: 0 },
                                                                      { text: "Mother so'zining tarjimasi nima?", options: ["Ota", "Ona", "Aka", "Opacha"], correct: 1 },
                                                                      { text: "Brother so'zining tarjimasi nima?", options: ["Ota", "Ona", "Aka", "Uka"], correct: 2 }
                                                            ]
                                                  };
                                                  showWelcome();
                                        }
                              }

                              function showWelcome() {
                                        document.getElementById('welcomeTitle').textContent = testData.title;
                                        document.getElementById('welcomeInfo').textContent =
                                                  `${testData.class_name || ''} — ${testData.questions.length} ta savol`;
                                        document.getElementById('startBtn').style.display = '';
                              }

                              // === START QUIZ ===
                              function startQuiz() {
                                        document.getElementById('welcomeScreen').classList.add('hidden');
                                        document.getElementById('quizScreen').classList.remove('hidden');
                                        document.getElementById('testTitle').textContent = testData.title;
                                        document.getElementById('className').textContent = testData.class_name || '';
                                        showQuestion(0);
                              }

                              // === SHOW QUESTION ===
                              function showQuestion(idx) {
                                        if (idx < 0 || idx >= testData.questions.length) return;
                                        currentQ = idx;
                                        answerRevealed = false;
                                        const q = testData.questions[idx];
                                        const total = testData.questions.length;

                                        document.getElementById('questionText').textContent = q.text;
                                        document.getElementById('questionCounter').textContent = `${idx + 1} / ${total}`;
                                        document.getElementById('progressFill').style.width = `${((idx + 1) / total) * 100}%`;

                                        // Options
                                        const grid = document.getElementById('optionsGrid');
                                        grid.innerHTML = '';
                                        const letters = ['A', 'B', 'C', 'D'];
                                        const classes = ['option-a', 'option-b', 'option-c', 'option-d'];
                                        q.options.forEach((opt, i) => {
                                                  const div = document.createElement('div');
                                                  div.className = `option ${classes[i]}`;
                                                  div.dataset.index = i;
                                                  div.innerHTML = `<div class="letter">${letters[i]}</div><span>${opt}</span>`;
                                                  grid.appendChild(div);
                                        });

                                        // Navigation
                                        document.getElementById('prevBtn').disabled = idx === 0;
                                        document.getElementById('nextBtn').textContent = idx === total - 1 ? '🏁 Tugatish' : 'Keyingi ▶';
                                        document.getElementById('showAnswerBtn').textContent = '👁 Javobni ko\'rsatish';

                                        // Timer reset
                                        timerSeconds = 0;
                                        clearInterval(timerInterval);
                                        timerInterval = setInterval(() => {
                                                  timerSeconds++;
                                                  const m = Math.floor(timerSeconds / 60);
                                                  const s = timerSeconds % 60;
                                                  document.getElementById('timerDisplay').textContent =
                                                            `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                                        }, 1000);
                              }

                              // === REVEAL ANSWER ===
                              function revealAnswer() {
                                        if (answerRevealed) {
                                                  // Hide answer
                                                  answerRevealed = false;
                                                  document.querySelectorAll('.option').forEach(o => o.classList.remove('correct'));
                                                  document.getElementById('showAnswerBtn').textContent = '👁 Javobni ko\'rsatish';
                                                  return;
                                        }
                                        answerRevealed = true;
                                        const q = testData.questions[currentQ];
                                        const options = document.querySelectorAll('.option');
                                        options.forEach((o, i) => {
                                                  if (i === q.correct) o.classList.add('correct');
                                        });
                                        document.getElementById('showAnswerBtn').textContent = '🙈 Javobni yashirish';
                              }

                              // === NAVIGATION ===
                              function nextQuestion() {
                                        if (currentQ >= testData.questions.length - 1) {
                                                  // Show leaderboard / finish
                                                  clearInterval(timerInterval);
                                                  document.getElementById('quizScreen').classList.add('hidden');
                                                  document.getElementById('leaderboardScreen').classList.remove('hidden');
                                                  showFinish();
                                                  return;
                                        }
                                        showQuestion(currentQ + 1);
                              }

                              function prevQuestion() {
                                        if (currentQ > 0) showQuestion(currentQ - 1);
                              }

                              function showFinish() {
                                        const table = document.getElementById('lbTable');
                                        table.innerHTML = `
                <div class="lb-row" style="background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.3);">
                    <div class="rank">✅</div>
                    <div class="name">Test yakunlandi!</div>
                    <div class="score">${testData.questions.length} ta savol</div>
                </div>
                <div style="text-align:center; color:#94a3b8; margin-top:24px; font-size:16px;">
                    📱 Natijalar telefondagi skaner ilovasida ko'rinadi.<br>
                    Bot orqali leaderboard yuboriladi.
                </div>
            `;
                              }

                              // === FULLSCREEN ===
                              document.getElementById('fullscreenBtn').addEventListener('click', () => {
                                        if (!document.fullscreenElement) {
                                                  document.documentElement.requestFullscreen();
                                        } else {
                                                  document.exitFullscreen();
                                        }
                              });

                              // === KEYBOARD CONTROLS ===
                              document.addEventListener('keydown', (e) => {
                                        if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextQuestion(); }
                                        if (e.key === 'ArrowLeft') { e.preventDefault(); prevQuestion(); }
                                        if (e.key === 'Enter') { e.preventDefault(); revealAnswer(); }
                              });

                              // === EVENTS ===
                              document.getElementById('startBtn').addEventListener('click', startQuiz);
                              document.getElementById('nextBtn').addEventListener('click', nextQuestion);
                              document.getElementById('prevBtn').addEventListener('click', prevQuestion);
                              document.getElementById('showAnswerBtn').addEventListener('click', revealAnswer);

                              // === INIT ===
                              loadTestData();
                    })();
          </script>
</body>

</html>
