<!DOCTYPE html>
<html lang="uz">

<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>LLabQR — O'quvchi kartalari (Print)</title>
          <style>
                    * {
                              margin: 0;
                              padding: 0;
                              box-sizing: border-box;
                    }

                    body {
                              font-family: Arial, sans-serif;
                              padding: 20px;
                              background: white;
                              color: #333;
                    }

                    h1 {
                              text-align: center;
                              margin-bottom: 8px;
                              font-size: 24px;
                    }

                    .info {
                              text-align: center;
                              color: #666;
                              margin-bottom: 24px;
                              font-size: 14px;
                    }

                    .controls {
                              text-align: center;
                              margin-bottom: 24px;
                    }

                    .controls button {
                              padding: 12px 28px;
                              font-size: 16px;
                              cursor: pointer;
                              background: #6366f1;
                              color: white;
                              border: none;
                              border-radius: 10px;
                              margin: 0 8px;
                    }

                    .controls button:hover {
                              background: #4f46e5;
                    }

                    .controls input {
                              width: 60px;
                              padding: 10px;
                              font-size: 16px;
                              text-align: center;
                              border: 2px solid #ddd;
                              border-radius: 8px;
                    }

                    /* Print grid - 5 cards per row */
                    .cards-grid {
                              display: grid;
                              grid-template-columns: repeat(5, 1fr);
                              gap: 12px;
                              max-width: 1000px;
                              margin: 0 auto;
                    }

                    .card {
                              border: 2px solid #333;
                              border-radius: 8px;
                              padding: 8px;
                              text-align: center;
                              page-break-inside: avoid;
                    }

                    .card .student-id {
                              font-size: 14px;
                              font-weight: 900;
                              margin-bottom: 6px;
                              color: #1e293b;
                    }

                    /* A/B/C/D labels around the marker */
                    .abcd-container {
                              position: relative;
                              width: 130px;
                              height: 130px;
                              margin: 0 auto;
                    }

                    .abcd-container canvas {
                              position: absolute;
                              top: 15px;
                              left: 15px;
                    }

                    .abcd-label {
                              position: absolute;
                              font-weight: 900;
                              font-size: 16px;
                              display: flex;
                              align-items: center;
                              justify-content: center;
                              width: 24px;
                              height: 24px;
                              border-radius: 4px;
                    }

                    .abcd-top {
                              top: -6px;
                              left: 50%;
                              transform: translateX(-50%);
                              background: #ef4444;
                              color: #fff;
                    }

                    .abcd-right {
                              right: -6px;
                              top: 50%;
                              transform: translateY(-50%);
                              background: #3b82f6;
                              color: #fff;
                    }

                    .abcd-bottom {
                              bottom: -6px;
                              left: 50%;
                              transform: translateX(-50%);
                              background: #f59e0b;
                              color: #fff;
                    }

                    .abcd-left {
                              left: -6px;
                              top: 50%;
                              transform: translateY(-50%);
                              background: #22c55e;
                              color: #fff;
                    }

                    .card .hint {
                              font-size: 9px;
                              color: #999;
                              margin-top: 6px;
                    }

                    @media print {

                              .controls,
                              .info,
                              h1 {
                                        display: none;
                              }

                              body {
                                        padding: 10px;
                              }

                              .cards-grid {
                                        gap: 8px;
                              }

                              .card {
                                        border-width: 1px;
                              }
                    }
          </style>
</head>

<body>
          <h1>🎯 LLabQR — O'quvchi kartalari</h1>
          <p class="info">
                    Har bir o'quvchiga bitta karta tarqating. Javob berish uchun kartani to'g'ri tomonga
                    aylantiring.<br>
                    <strong style="color:#ef4444">A</strong> = yuqorida &nbsp;
                    <strong style="color:#3b82f6">B</strong> = o'ngda &nbsp;
                    <strong style="color:#f59e0b">C</strong> = pastda &nbsp;
                    <strong style="color:#22c55e">D</strong> = chapda
          </p>

          <div class="controls">
                    <label>O'quvchilar soni: </label>
                    <input type="number" id="countInput" value="30" min="1" max="100">
                    <button onclick="generateCards()">🔄 Yaratish</button>
                    <button onclick="window.print()">🖨️ Chop etish</button>
          </div>

          <div id="cardsContainer" class="cards-grid"></div>

          <script>
                    // =============================================
                    // CORRECT ArUco MARKER PATTERN GENERATION
                    // These patterns match the js-aruco detector's
                    // hammingDistance() and mat2id() algorithms.
                    // =============================================

                    // The 4 valid ArUco row patterns
                    const VALID_ROWS = [
                              [1, 0, 0, 0, 0],   // col1=0, col3=0 → digit 0
                              [1, 0, 1, 1, 1],   // col1=0, col3=1 → digit 1
                              [0, 1, 0, 0, 1],   // col1=1, col3=0 → digit 2
                              [0, 1, 1, 1, 0]    // col1=1, col3=1 → digit 3
                    ];

                    /**
                     * Generate the correct 5x5 bit pattern for a given ArUco ID.
                     *
                     * The mat2id function computes:
                     *   for each row i: id = (id << 1) | bits[i][1]; id = (id << 1) | bits[i][3];
                     *
                     * So the ID is encoded as 5 base-4 digits, where each digit
                     * determines which valid row pattern to use.
                     */
                    function generatePattern(id) {
                              const pattern = [];
                              for (let row = 0; row < 5; row++) {
                                        // Extract 2-bit digit for this row (most significant row first)
                                        const shift = (4 - row) * 2;
                                        const digit = (id >> shift) & 3;
                                        pattern.push([...VALID_ROWS[digit]]);
                              }
                              return pattern;
                    }

                    /**
                     * Draw a 7x7 ArUco marker on a canvas.
                     * The marker has a 1-cell black border and a 5x5 inner pattern.
                     */
                    function drawMarker(id, size) {
                              const canvas = document.createElement('canvas');
                              canvas.width = size;
                              canvas.height = size;
                              const ctx = canvas.getContext('2d');
                              const cell = size / 7;

                              // Fill all black (border)
                              ctx.fillStyle = '#000';
                              ctx.fillRect(0, 0, size, size);

                              // Draw inner 5x5 pattern
                              const pattern = generatePattern(id);
                              for (let i = 0; i < 5; i++) {
                                        for (let j = 0; j < 5; j++) {
                                                  ctx.fillStyle = pattern[i][j] === 1 ? '#fff' : '#000';
                                                  ctx.fillRect((j + 1) * cell, (i + 1) * cell, cell, cell);
                                        }
                              }
                              return canvas;
                    }

                    /**
                     * Verify a pattern produces the expected ID (for debugging).
                     */
                    function verifyPattern(id) {
                              const pattern = generatePattern(id);
                              let computedId = 0;
                              for (let i = 0; i < 5; i++) {
                                        computedId <<= 1;
                                        computedId |= pattern[i][1];
                                        computedId <<= 1;
                                        computedId |= pattern[i][3];
                              }
                              return computedId === id;
                    }

                    function generateCards() {
                              const count = Math.min(parseInt(document.getElementById('countInput').value) || 30, 100);
                              const container = document.getElementById('cardsContainer');
                              container.innerHTML = '';

                              for (let i = 0; i < count; i++) {
                                        const card = document.createElement('div');
                                        card.className = 'card';

                                        // Student number
                                        const idDiv = document.createElement('div');
                                        idDiv.className = 'student-id';
                                        idDiv.textContent = `#${i + 1}`;
                                        card.appendChild(idDiv);

                                        // ABCD container with marker
                                        const abcdDiv = document.createElement('div');
                                        abcdDiv.className = 'abcd-container';

                                        // ArUco ID = i (0-based), Student number = i+1
                                        const marker = drawMarker(i, 100);
                                        abcdDiv.appendChild(marker);

                                        // ABCD labels around the marker
                                        ['abcd-top', 'abcd-right', 'abcd-bottom', 'abcd-left'].forEach((cls, idx) => {
                                                  const span = document.createElement('span');
                                                  span.className = `abcd-label ${cls}`;
                                                  span.textContent = ['A', 'B', 'C', 'D'][idx];
                                                  abcdDiv.appendChild(span);
                                        });

                                        card.appendChild(abcdDiv);

                                        // Hint
                                        const hint = document.createElement('div');
                                        hint.className = 'hint';
                                        hint.innerHTML = '⬆A ➡B ⬇C ⬅D';
                                        card.appendChild(hint);

                                        container.appendChild(card);
                              }

                              // Verify all patterns are correct
                              let allValid = true;
                              for (let i = 0; i < count; i++) {
                                        if (!verifyPattern(i)) {
                                                  console.error(`Pattern ${i} verification FAILED!`);
                                                  allValid = false;
                                        }
                              }
                              if (allValid) console.log(`✅ All ${count} patterns verified correctly!`);
                    }

                    // Generate on load
                    generateCards();
          </script>
</body>

</html>
